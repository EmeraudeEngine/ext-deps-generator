name: libsndfile
source_dir: repositories/libsndfile
languages: [c, cxx]

depends_on:
  - libogg
  - libvorbis
  - flac
  - opus
  - mpg123
  - lame

use_install_prefix_as_find_root: true

cmake_options:
  BUILD_SHARED_LIBS: false
  BUILD_PROGRAMS: false
  BUILD_EXAMPLES: false
  BUILD_TESTING: false
  BUILD_REGTEST: false
  ENABLE_CPACK: false
  ENABLE_EXTERNAL_LIBS: true
  ENABLE_MPEG: true
  ENABLE_PACKAGE_CONFIG: true
  INSTALL_PKGCONFIG_MODULE: true
  CMAKE_POLICY_VERSION_MINIMUM: "3.5"

# Windows static build: force CONFIG-mode find_package so libsndfile picks
# up the FLAC/Vorbis/Opus/mpg123 CMake config files installed by each
# upstream (which correctly propagate FLAC__NO_DLL and friends as PUBLIC
# compile defs). libsndfile's bundled Find*.cmake modules forget to set
# FLAC__NO_DLL, leading to unresolved __imp_FLAC__* symbols when
# downstream code links against the static FLAC.lib.
platforms:
  windows:
    cmake_options:
      CMAKE_FIND_PACKAGE_PREFER_CONFIG: true
