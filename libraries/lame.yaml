name: lame
source_dir: repositories/lame
build_system: autotools
languages: [c]

# Windows: lame ships only old vc9 (VS 2008) project files which don't
# integrate cleanly with our MSVC 2022 toolchain. Disabled until a CMake
# or modern MSBuild path is wired up.
disabled_platforms: [windows]

autotools_options:
  enable_static: "yes"
  enable_shared: "no"
  enable_nasm: "yes"
  disable_frontend: true
  disable_decoder: true
  disable_gtktest: true
  disable_analyzer_hooks: true
