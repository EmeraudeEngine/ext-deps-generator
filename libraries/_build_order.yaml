# Build order configuration
# Libraries are built in this order. Libraries not listed here will be built
# after the listed ones, sorted alphabetically.
#
# The dependency system will still ensure that dependencies are built first,
# but this file controls the order within groups of libraries that have no
# dependencies on each other.

order:
  # Base compression libraries
  - zlib
  - bzip2
  - xz
  - zstd
  - brotli

  # Text and font
  - harfbuzz

  # Image processing
  - libjpeg-turbo

  # System utilities
  - cpu_features
  - hwloc

  # Audio
  - openal-soft
  - libsamplerate
  - libogg
  - opus
  - libvorbis
  - flac
  - mpg123
  - lame

  # Networking
  - libzmq

  # Image/Video format
  - libwebp
  - libvpx

  # Security
  - cryptopp-cmake
  - libressl

  # Geometry
  - clipper2

  # Windows-only
  - pthread-win32

  # Process control
  - reproc

  # Texture compression (BC7)
  - bc7enc_rdo

  # FBX parsing
  - ufbx

  # SPIR-V toolchain (build base before glslang)
  - spirv-headers
  - spirv-tools

  # ---- Libraries that depend on the above ----

  # GLSL -> SPIR-V compiler (depends on spirv-tools)
  - glslang

  # Audio metadata
  - taglib

  # Audio I/O (depends on libogg, opus, libvorbis, flac, mpg123, lame)
  - libsndfile

  # Image I/O
  - libpng

  # Archive
  - libzip

  # 3D formats
  - lib3mf

  # Font rendering
  - freetype

  # ZeroMQ C++ bindings
  - cppzmq
